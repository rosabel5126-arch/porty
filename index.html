<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rosabel's Portfolio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            padding: 20px;
            background-color: #f5f5f5;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background-color: white;
            padding: 20px;
            border-radius: 8px;
        }

        .canva-container {
            position: relative;
            width: 100%;
            max-width: 900px;
            height: 0;
            padding-top: 56.2225%;
            padding-bottom: 0;
            box-shadow: 0 2px 8px 0 rgba(63,69,81,0.16);
            margin-top: 1.6em;
            margin-bottom: 0.9em;
            margin-left: auto;
            margin-right: auto;
            overflow: hidden;
            border-radius: 8px;
            will-change: transform;
        }

        .canva-container iframe {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            border: none;
            padding: 0;
            margin: 0;
        }

        .download-section {
            text-align: center;
            margin-top: 2em;
            padding: 20px;
            background-color: #f9f9f9;
            border-radius: 8px;
        }

        .download-link {
            display: inline-block;
            padding: 12px 24px;
            background-color: #0066cc;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 600;
            transition: background-color 0.3s ease;
            margin: 8px;
        }

        .download-link:hover {
            background-color: #0052a3;
        }

        .credit {
            text-align: center;
            font-size: 14px;
            color: #666;
            margin-top: 1em;
        }

        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }

            .canva-container {
                max-width: 100% !important;
                margin-left: 0 !important;
                margin-right: 0 !important;
            }

            .download-link {
                display: block;
                width: 100%;
                margin: 10px 0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="canva-container">
            <iframe loading="lazy"
                src="https://www.canva.com/design/DAHJ6EmTCRk/OpgqA1CgXfogWfJrqabdCQ/view?embed" 
                allowfullscreen="allowfullscreen" 
                allow="fullscreen">
            </iframe>
        </div>

        <div class="download-section">
            <h2>Download Documents</h2>
            <a href="assets/portfolio.pdf" download class="download-link">📄 Download Portfolio (PDF)</a>
            <a href="assets/resume.pdf" download class="download-link">📋 Download Resume (PDF)</a>
            <a href="articles.html" class="download-link">📚 Articles & Documents</a>
            <p class="credit">Portfolio by Rosabel Tomikeimieye</p>
        </div>
    </div>
</body>
</html>
